<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tab title is updated by main.js to reflect the current board name. -->
  <title>Chassis</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1a'/%3E%3Cpath d='M21.5 7.2a5.2 5.2 0 0 0-6.3 6.6L7.4 21.6a2 2 0 0 0 2.9 2.9l7.8-7.8a5.2 5.2 0 0 0 6.6-6.3l-3 3-2.8-.7-.7-2.8z' fill='none' stroke='%23e8650a' stroke-width='2' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="app">

  <!-- Hamburger appears only below 768px to reveal the sidebar drawer. -->
  <button class="hamburger" id="hamburger" aria-label="Open navigation">=</button>
  <div class="scrim" id="scrim" hidden></div>

  <div class="app-shell">
    <!-- Sidebar navigation. Buttons drive the hash router in main.js. -->
    <aside class="sidebar" id="sidebar">
      <a class="wordmark" href="index.html">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path class="mark-stroke" d="M21.5 7.2a5.2 5.2 0 0 0-6.3 6.6L7.4 21.6a2 2 0 0 0 2.9 2.9l7.8-7.8a5.2 5.2 0 0 0 6.6-6.3l-3 3-2.8-.7-.7-2.8z"
                fill="none" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
        Chassis
      </a>

      <div class="team-chip" id="team-chip">
        <strong>Loading...</strong>
        <span>Connecting to board</span>
      </div>

      <a class="nav-link" href="#feed" data-nav="feed">Feed</a>
      <a class="nav-link" href="#new" data-nav="new">New Entry</a>
      <a class="nav-link" href="#stats" data-nav="stats">Stats</a>
      <a class="nav-link" href="#calendar" data-nav="calendar">Calendar</a>

      <div class="nav-spacer"></div>

      <button class="nav-link" id="nav-share">Share Board</button>
      <button class="nav-link" id="nav-export">Export PDF</button>
      <button class="nav-link" id="nav-signout">Sign Out</button>
    </aside>

    <!-- Everything renders into this node. No full page reloads. -->
    <main class="content" id="view"></main>
  </div>

  <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle light and dark theme">D</button>

  <script type="module" src="main.js"></script>
</body>
</html>
