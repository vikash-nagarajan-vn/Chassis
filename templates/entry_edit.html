{% extends "board_base.html" %}
{% block heading %}Edit entry{% endblock %}
{% block content %}
<div class="wrap" style="max-width:640px">
  <div class="page-head"><div><div class="eyebrow">Edit entry</div><h1>Edit entry</h1></div></div>

  <form method="post" action="{{ base }}/entry/{{ e.id }}/edit" class="card" style="padding:20px">
    <div class="field">
      <label>Title</label>
      <input type="text" name="title" value="{{ e.title }}" required autofocus>
    </div>
    <div class="field">
      <label>What happened and what you learned</label>
      <textarea name="description">{{ e.description }}</textarea>
    </div>
    <div class="field">
      <label>Categories <span class="hint">pick one or more</span></label>
      <div class="tagrow" style="margin-top:8px">
        {% for t in board.tags %}
        <label style="cursor:pointer"><input type="checkbox" name="tag_ids" value="{{ t.id }}" {{ 'checked' if t.id in e.tag_ids }} hidden>
          <span class="chip chip-btn" style="color: {{ t.color }}; border-color: {{ t.color }}55; background: {{ t.color }}1a"><span class="dot" style="background: {{ t.color }}"></span>{{ t.name }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:180px">
        <label>Status</label>
        <div class="segmented" style="margin-top:6px">
          <label><input type="radio" name="status" value="in_progress" {{ 'checked' if e.status != 'solved' }} hidden><span class="seg">In progress</span></label>
          <label><input type="radio" name="status" value="solved" {{ 'checked' if e.status == 'solved' }} hidden><span class="seg">Solved</span></label>
        </div>
      </div>
      <div class="field" style="flex:1;min-width:180px">
        <label>Author</label>
        <input type="text" name="author" value="{{ e.author }}" placeholder="your name or handle">
      </div>
    </div>
    <div class="field" style="border:1px solid var(--hairline);border-radius:10px;padding:12px">
      <label style="display:flex;align-items:center;gap:9px;font-weight:500">
        <input type="checkbox" name="contact_optin" value="1" {{ 'checked' if e.contact_email }} style="width:auto;margin:0" onchange="document.getElementById('email-row').style.display = this.checked ? 'block' : 'none'">
        Let teammates contact me about this entry
      </label>
      <div id="email-row" style="{{ 'display:block' if e.contact_email else 'display:none' }};margin-top:10px">
        <input type="email" name="contact_email" value="{{ e.contact_email }}" placeholder="email (optional)">
        <div class="hint" style="margin-top:6px">Only visible to signed-in members of your team.</div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:4px">
      <a class="btn btn-ghost" href="{{ base }}/entry/{{ e.id }}">Cancel</a>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </div>
  </form>
</div>
{% endblock %}
