{% extends "board_base.html" %}
{% block heading %}Feed{% endblock %}
{% block content %}
<div class="wrap">
  <div class="page-head">
    <div>
      <div class="eyebrow">{{ competition }} {{ doc }}</div>
      <h1>{{ page_title }}</h1>
    </div>
    <a class="btn btn-outline btn-sm" href="{{ base }}/export.pdf">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"></path></svg>
      Export PDF
    </a>
  </div>

  <form id="feed-controls" hx-get="{{ base }}/list" hx-target="#entry-list-region" hx-swap="innerHTML"
        hx-trigger="change, keyup changed delay:250ms from:input[name='q']">
    <div class="searchbar">
      <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg></span>
      <input type="text" name="q" value="{{ q }}" placeholder="Search entries. Typos are fine, try gearbx" autocomplete="off">
    </div>

    <div class="filters">
      <div class="segmented">
        <label><input type="radio" name="status" value="all" {{ 'checked' if status == 'all' }} hidden><span class="seg {{ 'active' if status == 'all' }}">All</span></label>
        <label><input type="radio" name="status" value="in_progress" {{ 'checked' if status == 'in_progress' }} hidden><span class="seg {{ 'active' if status == 'in_progress' }}">In progress</span></label>
        <label><input type="radio" name="status" value="solved" {{ 'checked' if status == 'solved' }} hidden><span class="seg {{ 'active' if status == 'solved' }}">Solved</span></label>
      </div>
      <span class="vsep"></span>
      <div class="tagrow">
        <label><input type="radio" name="tag" value="" {{ 'checked' if not active_tag }} hidden><span class="chip chip-btn {{ 'sel' if not active_tag }}" style="border-color:var(--hairline);color:var(--muted)">All tags</span></label>
        {% for t in board.tags %}
        <label><input type="radio" name="tag" value="{{ t.id }}" {{ 'checked' if active_tag == t.id }} hidden><span class="chip chip-btn" style="color: {{ t.color }}; border-color: {{ t.color }}55; background: {{ t.color }}1a"><span class="dot" style="background: {{ t.color }}"></span>{{ t.name }}</span></label>
        {% endfor %}
      </div>
    </div>
  </form>

  <div id="entry-list-region" style="margin-top:20px">
    {% include "partials/entry_list.html" %}
  </div>
</div>
{% endblock %}
